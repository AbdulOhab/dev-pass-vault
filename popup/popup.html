<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Pass Vault</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span>Dev Pass Vault</span>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="icon-btn" title="Toggle dark/light mode">
          <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <a href="../options/options.html" target="_blank" class="icon-btn" title="Manage all credentials">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07m14.14 0A10 10 0 0 0 4.93 4.93"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- ── Add / Edit form (shown/hidden) ── -->
    <div id="add-form" class="add-form hidden">
      <div class="add-form-title">
        <span id="form-title">New Credential</span>
        <button id="add-form-close" class="icon-btn-sm" title="Cancel">✕</button>
      </div>

      <div class="form-row">
        <label class="field-label">Label</label>
        <input id="f-label" class="field-input" type="text" placeholder="e.g. Dev Admin" />
      </div>
      <div class="form-row">
        <label class="field-label">Username / Email <span class="req">*</span></label>
        <input id="f-username" class="field-input" type="text" placeholder="user@example.com" autocomplete="off" />
      </div>
      <div class="form-row">
        <label class="field-label">Password <span class="req">*</span></label>
        <div class="pw-row">
          <input id="f-password" class="field-input" type="password" placeholder="••••••••" autocomplete="off" />
          <button class="pw-eye" type="button" title="Show/hide">👁</button>
        </div>
      </div>
      <div class="form-row">
        <label class="field-label">Tags <span class="field-hint">(comma separated)</span></label>
        <input id="f-tags" class="field-input" type="text" placeholder="dev, admin, staging" />
      </div>
      <div class="form-row">
        <label class="field-label">Notes</label>
        <textarea id="f-notes" class="field-input field-textarea" rows="2" placeholder="Optional notes…"></textarea>
      </div>
      <div class="form-row">
        <div class="url-rules-header">
          <label class="field-label" style="margin:0">URL Rules</label>
          <button id="f-add-rule" class="icon-btn-sm" title="Add rule" style="font-size:15px;width:20px;height:20px">+</button>
        </div>
        <div id="f-rules-list"></div>
      </div>

      <div class="add-form-footer">
        <button id="f-save" class="btn btn-primary">Save</button>
        <button id="f-delete" class="btn btn-danger hidden">Delete</button>
        <button id="f-cancel" class="btn btn-ghost">Cancel</button>
      </div>
      <div id="f-error" class="form-error hidden"></div>
    </div>

    <div class="search-wrap">
      <input type="text" id="search" class="search-input" placeholder="Search credentials…" />
    </div>

    <div id="current-url-row" class="url-row hidden">
      <span class="url-label">Active page:</span>
      <span id="current-url" class="url-value"></span>
    </div>

    <div id="list" class="list"></div>

    <footer class="footer">
      <button id="add-btn" class="btn btn-primary">+ Add Credential</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
